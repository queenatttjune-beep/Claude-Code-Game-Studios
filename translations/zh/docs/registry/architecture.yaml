# 架构决策注册表
#
# 目的：所有 ADR 必须达成一致的关键架构立场的单一事实来源。
# Skill 在编写新的 ADR 之前检查此注册表，以在起草时检测冲突——
# 在针对矛盾决策创建 story 之前。
#
# 规则：
#   - 当某个立场限制了其他系统的构建方式时进行注册。
#     仅影响一个 ADR 的内部实现细节不需要注册。
#   - 切勿删除条目——设置 status: superseded_by: ADR-NNNN 代替。
#   - 当立场变更时：更新条目，设置 revised: 为今天的日期，
#     添加旧值的注释，并运行 /architecture-review 检查哪些 ADR 现在失效。
#   - adr: 是权威来源。所有依赖此立场的其他 ADR
#     在 referenced_by 中列出自己。
#
# 编写者：/architecture-decision（阶段 5 — ADR 批准后）
# 读取者：/architecture-decision（步骤 2 — 起草开始前）
#             /architecture-review（阶段 4 — 跨 ADR 冲突基线）
#             /create-stories（将架构约束嵌入 story）
#             /dev-story（检查实现是否符合已接受的立场）
#
# 搜索模式（供使用 Grep 的 skill 使用）：
#   所有状态拥有者：         Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   谁拥有 player_health：   Grep pattern="state: player_health"
#   所有信号合约：            Grep pattern="pattern: signal"
#   战斗预算：                Grep pattern="system: combat"
#   所有禁止模式：            Grep pattern="^  - pattern:"（forbidden_patterns 部分）
#   被替换的条目：            Grep pattern="status: superseded"

version: 1
last_updated: ""

# ─── 状态所有权 ─────────────────────────────────────────────────────────
# 每部分共享游戏状态的权威拥有者是谁。
# 冲突：两个 ADR 声称拥有相同状态 = 数据竞争 / 权威错误。
#
# 当状态被多个系统读取或写入时进行注册。
# 仅内部状态（从未被另一个系统访问）不需要注册。
#
# 必填字段：state、owner_system、adr、interface、referenced_by[]、added
# interface：其他系统如何访问此状态（只读属性、方法调用、
#   信号、共享资源等）——这是其他 ADR 依赖的合约。

state_ownership: []

# 示例：
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health（只读浮点数，范围 0–max_health）"
#     write_access: health-system-only   # 只有拥有者可以写入；其他人读取
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # 读取以应用伤害
#       - docs/architecture/adr-0007-ui-system.md       # 读取以显示 HUD
#     added: 2026-03-26
#     revised: ""


# ─── 接口合约 ──────────────────────────────────────────────────────
# 系统之间需要如何通信。
# 冲突：一个 ADR 期望信号，另一个期望直接调用 = 集成错误。
#
# 当两个系统之间的通信模式在 ADR 中明确决定
# 且其他系统必须遵循相同模式时注册合约。
#
# pattern 选项：signal | direct_call | event_bus | shared_resource | rpc | none

interfaces: []

# 示例：
#
# interfaces:
#   - contract: damage_delivery
#     status: active
#     pattern: signal          # 生产方如何通知消费方
#     producer: combat-system
#     consumers:
#       - health-system        # 接收 damage_dealt 信号，应用于生命值
#       - ui-system            # 接收 damage_dealt 信号，显示伤害数字
#       - audio-system         # 接收 damage_dealt 信号，播放 SFX
#     adr: docs/architecture/adr-0003-combat-system.md
#     signal_signature: "damage_dealt(amount: float, target: Node, is_crit: bool)"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#       - docs/architecture/adr-0001-health-system.md
#     added: 2026-03-26
#     revised: ""


# ─── 性能预算 ──────────────────────────────────────────────────────
# 每个系统的帧时间分配，针对定义的总帧预算。
# 冲突：分配总和超过总预算 = 无法发布。
#
# 当 ADR 明确声明帧时间分配时注册预算。
# 注册表让 /architecture-review 验证总数不超过目标。

performance_budgets: []

# 示例：
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "包括物理查询、碰撞箱评估和伤害计算"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API 决策 ─────────────────────────────────────────────────────────
# 项目范围内选择了哪些引擎 API 用于什么目的。
# 冲突：两个 ADR 为同一目的使用不同 API = 实现不一致，
# 当某个系统期望另一个系统的 API 时会出错。
#
# 当选择不明显且其他 ADR 可能在不知道已做决定的情况下
# 为同一目的做出不同选择时注册 API 决策。

api_decisions: []

# 示例：
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # 为此目的明确禁止
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "直接服务器调用避免了每帧节点开销；性能分析中快 3 倍"
#     referenced_by:
#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── 禁止模式 ──────────────────────────────────────────────────────
# 已被接受的 ADR 明确禁止的架构反模式。
# 编写新 ADR 时，检查此列表——如果建议的方法
# 匹配某个禁止模式，则必须在 ADR 可被接受之前重新设计。
#
# 当 ADR 明确禁止某个模式且其他 ADR 可能
# 无意中使用了它时（即，对项目来说它是个诱人但错误的方法）进行注册。

forbidden_patterns: []

# 示例：
#
# forbidden_patterns:
#   - pattern: autoload_singleton_coupling
#     status: active
#     description: "系统不得直接按名称引用 Autoload 单例。
#       使用依赖注入或信号代替。"
#     why: "与 Autoload 的紧耦合使系统无法隔离测试，
#       并在 Autoload 加载顺序改变时创建隐藏依赖。"
#     adr: docs/architecture/adr-0001-health-system.md
#     added: 2026-03-26
#
#   - pattern: direct_cross_system_state_write
#     status: active
#     description: "系统绝不能写入另一个系统拥有的状态。
#       改为使用信号或对拥有者方法调用。"
#     why: "直接状态写入创建竞争条件并破坏状态
#       所有权模型。拥有系统必须是唯一的写入者。"
#     adr: docs/architecture/adr-0000-architecture-principles.md
#     added: 2026-03-26
