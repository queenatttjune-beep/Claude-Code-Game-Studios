# 游戏世界实体注册表
#
# 目的：所有出现在多个文档中的命名游戏世界事实的唯一真实来源。
# Skill 在写入新内容前检查此文件，以在创作时检测跨文档不一致。
#
# 规则：
#   - 仅注册跨系统边界的事实。仅内部使用的事实（仅在一个 GDD 中使
#     用的公式）无需注册。
#   - 绝不删除条目 —— 改为设置 status: deprecated。
#   - 当值发生变化时：更新值，设置 revised 为今天的日期，并添加注
#     释说明旧值以及是哪个 GDD 更改了它。
#   - source 是权威 GDD —— 即"拥有"此事实的 GDD。引用它的其他 GDD
#     将自身列在 referenced_by 中。
#   - 当新 GDD 引用现有条目时，将其路径追加到 referenced_by。不要
#     创建重复条目。
#
# 编写者：/design-system（阶段 5 — GDD 章节批准后）
#            /consistency-check（解决冲突时）
# 读取者：/design-system（阶段 2 — 开始创作前，以及章节 C/D 写入后
#           检查新实体/公式的冲突）
#            /consistency-check（主要输入 — 先 grep，后 GDD）
#            /review-all-gdds（阶段 1 — 阶段 2 检查的基线）
#            /architecture-review（数据结构和接口验证）
#
# 搜索模式（供使用 Grep 的 skill 使用）：
#   所有实体名称：        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   特定实体：            Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   所有物品：            Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   combat.md 拥有什么：  Grep pattern="source: design/gdd/combat.md"
#   inventory.md 使用什么： Grep pattern="referenced_by.*inventory"
#   所有金币值：          Grep pattern="value_gold:"
#   已弃用条目：          Grep pattern="status: deprecated"
#
# 格式：YAML。一致的缩进对 grep 可靠性至关重要。
#   章节：entities | items | formulas | constants
#   每个条目：name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: ""

# ─── 实体 ────────────────────────────────────────────────────────────────
# 命名的游戏世界对象：敌人、NPC、角色、派系、Boss。
# 当实体出现在多个 GDD 中时在此注册 —— 例如，combat.md 中定义的敌
# 人也掉落 inventory.md 中列出的物品。
#
# 必填字段：name, status, source, referenced_by, added
# 属性字段：可能出现在另一个 GDD 中的任何关键统计数据
#   （血量、伤害、掉落物、派系等）

entities: []

# 示例（添加第一个真实条目时删除）：
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # 必须匹配 items 章节中的条目
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── 物品 ───────────────────────────────────────────────────────────────────
# 命名的可收集物、装备、消耗品、制作材料、货币。
# 当物品名称或值出现在多个 GDD 中时注册。
#
# 必填字段：name, status, source, referenced_by, added
# 属性字段：value_gold, weight, stackable, category，以及另一个系统
#   （如经济、制作）可能引用的任何属性修改器。

items: []

# 示例：
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # 掉落物在 combat GDD 中定义
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD 列出其重量/堆叠规则
#       - design/gdd/economy.md      # economy GDD 引用其售价
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── 公式 ────────────────────────────────────────────────────────────────
# 具有已定义变量和输出范围的命名计算。
# 当公式的输出作为另一个系统的输入，或另一个 GDD 按名称引用它时注册。
#
# 必填字段：name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# 可选：expression（实际公式）, notes

formulas: []

# 示例：
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD 缩放攻击变量
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
#     output_range: [0, 999]
#     expression: "max(0, attack - defense) * (1 + crit_chance * crit_multiplier)"
#     notes: "输出馈入 health-system 伤害接收。最小值为 0（护甲可以吸收
#       所有伤害）。公式中最大值无上限，但 combat.md 中的调节旋钮
#       damage_cap 限制在 999。"
#     added: 2026-03-26
#     revised: ""


# ─── 常量 ───────────────────────────────────────────────────────────────
# 跨多个系统引用的命名数值常量。
# 当一个常量在一个 GDD 中定义但另一个 GDD 必须与之保持一致时注册
# （例如，economy 中定义的金币携带上限但在 inventory 中检查，或
# inventory 中定义的背包格子数但在 HUD 中显示）。
#
# 必填字段：name, status, source, referenced_by, value, unit, added

constants: []

# 示例：
#
# constants:
#   - name: gold_carry_limit
#     status: active
#     source: design/gdd/economy.md
#     referenced_by:
#       - design/gdd/economy.md
#       - design/gdd/inventory.md   # inventory 强制执行携带上限
#       - design/gdd/ui.md          # HUD 显示当前金币 vs 上限
#     value: 9999
#     unit: gold
#     added: 2026-03-26
#     revised: ""
#
#   - name: base_inventory_slots
#     status: active
#     source: design/gdd/inventory.md
#     referenced_by:
#       - design/gdd/inventory.md
#       - design/gdd/progression.md  # progression 解锁额外格子
#     value: 20
#     unit: slots
#     added: 2026-03-26
#     revised: ""
